# Override the chart name
nameOverride: ""
# Override the full name of resources
fullnameOverride: ""

image:
  repository: nbomberdocker/nbomber-studio
  pullPolicy: IfNotPresent
  tag: ""  # Empty means use Chart.AppVersion

service:
  type: ClusterIP
  port: 80

resources:
  limits:
    memory: "2Gi"
  requests:
    memory: "500Mi"

# Configuration overrides
# You can override the default config.json using ConfigMap and/or Secret
config:
  # Use ConfigMap for non-sensitive configuration
  # This will be merged with the default config.json
  configMap:
    enabled: true
    data:
      Logger:
        MinimumLogLevel: "Information"
      Kubernetes:
        Enabled: true

  # Use Secret for sensitive configuration (PostgreSQL, Auth settings)
  # This will be merged with the default config.json
  # REQUIRED: you must either set secret.enabled=true with a PostgreSql.ConnectionString,
  # or provide config.existingSecret pointing to an existing Secret.
  #
  # IMPORTANT: Use the full K8s FQDN for the PostgreSQL host:
  #   <service>.<namespace>.svc.cluster.local
  # NBomber test Jobs run in testNamespace (see below), which is a different namespace
  # from where PostgreSQL is installed. A short hostname (without namespace) only resolves
  # within the same namespace and will cause connection failures from the test namespace.
  secret:
    enabled: false
    data:
      PostgreSql:
        ConnectionString: "Host=nbomber-timescale.default.svc.cluster.local;Port=5432;Username=nb_studio_db;Password=nb_studio_db;Database=nb_studio_db;Pooling=true;Maximum Pool Size=300;"
      Auth:
        Enabled: true
        
        # Change this to a strong secret in production
        # JwtSecret: ""

      License: ""

  # Alternative: use existing Secret/ConfigMap instead of creating new ones
  existingConfigMap: ""  # Name of existing ConfigMap
  existingSecret: ""     # Name of existing Secret

# Ingress configuration for HTTPS/TLS
ingress:
  enabled: false
  className: "traefik"  # Use your ingress controller class (nginx, traefik, etc.)
  annotations: 
    # Example annotations for traefik:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    # Example annotations for NGINX:
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # nginx.ingress.kubernetes.io/force-ssl-redirect: "true"    
    # Example annotations for cert-manager (automatic Let's Encrypt certificates):
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
    
  hosts:
    - host: nbomber-studio.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: nbomber-studio-tls
      hosts:
        - nbomber-studio.local  

# ServiceAccount for the Studio pod
serviceAccount:
  create: true
  name: ""        # Leave empty to use the auto-generated name
  annotations: {}

# Separate namespace where Studio deploys NBomber test Jobs/Pods/Secrets.
# Studio has full access here but cannot touch any other namespace.
testNamespace:
  name: "nbomber-tests"
  create: true    # Set to false if the namespace already exists

# Node scheduling
nodeSelector: {}
affinity: {}
tolerations: []
