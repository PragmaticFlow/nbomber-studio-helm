apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "nbomber-studio.fullname" . }}-test-manager
  namespace: {{ .Values.testNamespace.name }}
  labels:
    {{- include "nbomber-studio.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "nbomber-studio.fullname" . }}-test-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "nbomber-studio.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
