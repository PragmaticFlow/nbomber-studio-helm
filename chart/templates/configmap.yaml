{{- if and .Values.config.configMap.enabled (not .Values.config.existingConfigMap) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nbomber-studio.fullname" . }}-config
  labels:
    {{- include "nbomber-studio.labels" . | nindent 4 }}
data:
  config-override.json: |
    {{- toJson .Values.config.configMap.data | nindent 4 }}
{{- end }}
